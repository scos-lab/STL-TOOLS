name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags: v1.7.4, v2.0.0, etc.

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests
      run: pytest --cov=stl_parser

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write  # Required for Trusted Publisher (OIDC)

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Verify version matches tag
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        echo "Tag version: $TAG_VERSION"
        echo "Package version: $PKG_VERSION"
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "ERROR: Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
          exit 1
        fi

    - name: Build package
      run: python -m build

    - name: Check distribution
      run: twine check dist/*

    # Option 1: Trusted Publisher (OIDC) — no token needed
    # Requires one-time setup at https://pypi.org/manage/project/stl-parser/settings/publishing/
    # Add: owner=scos-lab, repo=STL-TOOLS, workflow=publish.yml, environment=pypi
    - name: Publish to PyPI (Trusted Publisher)
      uses: pypa/gh-action-pypi-publish@release/v1
      # If Trusted Publisher is not configured yet, comment out the above
      # and uncomment below to use API token:
      # - name: Publish to PyPI (API Token)
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: twine upload dist/*
